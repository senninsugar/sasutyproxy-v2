        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 20000; display: none; align-items: center; justify-content: center; animation: fadeIn 0.15s; }

    <script>
        const colorPicker = document.getElementById("colorPicker");
        if (colorPicker) {
            colorPicker.addEventListener("input", function () {
                document.documentElement.style.setProperty(
                    "--theme-color",
                    colorPicker.value
                );
                localStorage.setItem("themeColor", colorPicker.value);
            });
        }

        const savedColor = localStorage.getItem("themeColor");
        if (savedColor) {
            document.documentElement.style.setProperty(
                "--theme-color",
                savedColor
            );
            if (colorPicker) colorPicker.value = savedColor;
        }

        const colorPicker2 = document.getElementById("colorPicker2");
        if (colorPicker2) {
            colorPicker2.addEventListener("input", function () {
                document.documentElement.style.setProperty(
                    "--shadow-color",
                    colorPicker2.value
                );
                localStorage.setItem("shadowColor", colorPicker2.value);
            });
        }

        const savedColor2 = localStorage.getItem("shadowColor");
        if (savedColor2) {
            document.documentElement.style.setProperty(
                "--shadow-color",
                savedColor2
            );
            if (colorPicker2) colorPicker2.value = savedColor2;
        }

        const colorPicker3 = document.getElementById("colorPicker3");
        if (colorPicker3) {
            colorPicker3.addEventListener("input", function () {
                document.documentElement.style.setProperty(
                    "--shadow-color2",
                    colorPicker3.value
                );
                localStorage.setItem("shadowColor2", colorPicker3.value);
            });
        }

        const savedColor3 = localStorage.getItem("shadowColor2");
        if (savedColor3) {
            document.documentElement.style.setProperty(
                "--shadow-color2",
                savedColor3
            );
            if (colorPicker3) colorPicker3.value = savedColor3;
        }

        function toggleBackground() {
            var checkbox = document.getElementById("backgroundToggle");
            if (checkbox) {
                var isChecked = checkbox.checked;
                document.body.style.backgroundColor = isChecked ? "black" : "white";
                document.body.style.color = isChecked ? "#fff" : "#4c4c4c";
                localStorage.setItem("backgroundToggle", isChecked);
            }
        }

        function loadBackground() {
            var checkbox = document.getElementById("backgroundToggle");
            if (checkbox) {
                var isChecked = localStorage.getItem("backgroundToggle") === "true";
                checkbox.checked = isChecked;
                toggleBackground();
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            var checkbox = document.getElementById("backgroundToggle");
            if (checkbox) {
                checkbox.addEventListener("change", toggleBackground);
                loadBackground();
            }
            renderBookmarks();
        });

        if (localStorage.getItem("backgroundImage")) {
            document.getElementById("background").style.backgroundImage =
                localStorage.getItem("backgroundImage");
        }

        document.getElementById("upload-img")?.addEventListener("click", function () {
                document.getElementById("file-input").click();
        });

        document.getElementById("file-input")?.addEventListener("change", function (event) {
                var file = event.target.files[0];
                var reader = new FileReader();
                reader.onload = function (e) {
                    var backgroundImage = "url(" + e.target.result + ")";
                    document.getElementById("background").style.backgroundImage = backgroundImage;
                    localStorage.setItem("backgroundImage", backgroundImage);
                };
                reader.readAsDataURL(file);
        });

        document.getElementById("reset-img")?.addEventListener("click", function () {
                document.getElementById("background").style.backgroundImage = "";
                localStorage.removeItem("backgroundImage");
        });

        function myClock() {
            setTimeout(function () {
                const d = new Date();
                const n = d.toLocaleTimeString();
                const timeEl = document.getElementById("time");
                if (timeEl) timeEl.innerHTML = n;
                myClock();
            }, 1000);
        }
        myClock();

        var elem = document.documentElement;

        function openFullscreen() {
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        }

        function closeFullscreen() {
            if (document.exitFullscreen) { document.exitFullscreen(); } 
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } 
            else if (document.msExitFullscreen) { document.msExitFullscreen(); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const currentUrl = "https://desmos.com";
            const defaultKey = "`";
            let triggerKey = defaultKey;

            function updateTriggerKey(value) {
                triggerKey = value.slice(0, 1);
            }

            document.getElementById("keyInput")?.addEventListener("input", (e) => {
                    updateTriggerKey(e.target.value);
            });

            document.getElementById("keyInput")?.addEventListener("keypress", (e) => {
                    if (e.key === "Enter") {
                        updateTriggerKey(e.target.value);
                        e.preventDefault();
                    }
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === triggerKey) {
                    window.location.href = currentUrl;
                }
            });
        });

        function openGame() {
            var win = window.open();
            var url = window.location.href;
            var iframe = win.document.createElement("iframe");
            iframe.style.frameborder = "0";
            iframe.style.marginwidth = "0";
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.style.position = "fixed";
            iframe.style.inset = "0px";
            iframe.style.outline = "none";
            iframe.style.scrolling = "auto";
            iframe.src = url;
            win.document.title = "Google";
            var link = win.document.createElement("link");
            link.rel = "icon";
            link.type = "image/x-icon";
            link.href = "https://www.google.com/favicon.ico";
            win.document.head.appendChild(link);
            win.document.body.appendChild(iframe);
        }

        /* --- About:Blank Cloak Function --- */
        function openAboutBlank() {
            try {
                var win = window.open('about:blank', '_blank');
                if (!win) {
                    alert("ポップアップがブロックされました。許可してください。");
                    return;
                }
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                var iframe = win.document.createElement('iframe');
                iframe.style.border = 'none';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.margin = '0';
                iframe.src = window.location.href;
                win.document.body.appendChild(iframe);
            } catch(e) {
                alert("エラーが発生しました。");
            }
        }
    </script>

    <script>
        "use strict";

        class crypts {
          static encode(str) {
            return encodeURIComponent(
              str
                .toString()
                .split("")
                .map((char, ind) => (ind % 2 ? String.fromCharCode(char.charCodeAt() ^ 2) : char))
                .join("")
            );
          }

          static decode(str) {
            if (str.charAt(str.length - 1) === "/") {
              str = str.slice(0, -1);
            }
            return decodeURIComponent(
              str
                .split("")
                .map((char, ind) => (ind % 2 ? String.fromCharCode(char.charCodeAt() ^ 2) : char))
                .join("")
            );
          }
        }

        function search(input) {
          input = input.trim();
          const searchTemplate = 'https://google.com/search?q=%s';

          try {
            return new URL(input).toString();
          } catch (err) {
            try {
              const url = new URL(`http://${input}`);
              if (url.hostname.includes(".")) {
                return url.toString();
              }
              throw new Error('Invalid hostname');
            } catch (err) {
              return searchTemplate.replace("%s", encodeURIComponent(input));
            }
          }
        }
    </script>

    <script>
        let tabs = [];
        let activeTabId = null;
        let tabCount = 0;

        new Sortable(document.getElementById('tab-bar'), { animation: 150, filter: '.new-tab-btn' });

        function startTime() {
            const bar = document.getElementById('boot-bar');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => document.getElementById('boot-loader').style.opacity = '0', 200);
                    setTimeout(() => document.getElementById('boot-loader').remove(), 700);
                }
                bar.style.width = progress + '%';
            }, 150);
            addNewTab();
            initPanicButton();
        }

        function addNewTab() {
            const id = 'tab-' + (++tabCount);
            tabs.push({ id: id, title: '新しいタブ', url: '', isStartPage: true, isSettingPage: false });
            
            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.id = 'handle-' + id;
            tabEl.onclick = () => switchTab(id);
            tabEl.innerHTML = `<span class="tab-title" id="title-${id}">新しいタブ</span><i class="fa-solid fa-xmark tab-close" onclick="event.stopPropagation(); closeTab('${id}')"></i>`;
            
            document.getElementById('tab-bar').insertBefore(tabEl, document.querySelector('.new-tab-btn'));
            
            const contentEl = document.createElement('div');
            contentEl.className = 'tab-content';
            contentEl.id = 'content-' + id;
            contentEl.innerHTML = createStartPageHTML(id);
            
            document.getElementById('viewport-container').appendChild(contentEl);
            switchTab(id);
        }

        function createStartPageHTML(tabId) {
            return `
            <div class="start-page">
                <div class="start-logo">sasuty proxy v1</div>
                <div class="searchbar-wrapper">
                    <div class="searchbar-left">
                        <span class="search-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                        </span>
                    </div>
                    <form class="searchbar-center" onsubmit="event.preventDefault(); navigate('${tabId}', this.querySelector('.searchbar-input').value);">
                        <input type="text" class="searchbar-input" maxlength="2048" autocapitalize="off" autocomplete="off" placeholder="Google で検索または URL を入力、または sp//setting" />
                    </form>
                </div>
                <div class="quick-links">
                </div>
            </div>`;
        }

        function createSettingPageHTML(tabId) {
            const historyChecked = localStorage.getItem('saveHistory') !== 'false' ? 'checked' : '';
            return `
            <div class="setting-page">
                <div class="setting-title">設定</div>
                <div class="setting-section">
                    <div class="setting-row">
                        <div class="setting-info">
                            <div class="setting-label">about:blank で開く</div>
                            <div class="setting-desc">現在のプロキシを強力に偽装された独立ウィンドウで起動します。</div>
                        </div>
                        <button class="setting-btn" onclick="openAboutBlank()">起動する</button>
                    </div>
                </div>
                <div class="setting-section">
                    <div class="setting-row">
                        <div class="setting-info">
                            <div class="setting-label">履歴の保存</div>
                            <div class="setting-desc">プロキシ内での閲覧URLログ情報を内部に記憶するかどうかを切り替えます。</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="history-toggle" ${historyChecked} onchange="toggleHistorySave(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="setting-section">
                    <div class="setting-row">
                        <div class="setting-info">
                            <div class="setting-label">データを完全に削除</div>
                            <div class="setting-desc">お気に入り、背景画像、カスタム設定など全てのストレージデータを完全に初期化します。</div>
                        </div>
                        <button class="setting-btn danger" onclick="clearAllData()">完全に削除</button>
                    </div>
                </div>
            </div>`;
        }

        function toggleHistorySave(checked) {
            localStorage.setItem('saveHistory', checked);
        }

        function clearAllData() {
            if(confirm("すべてのお気に入り、設定、背景データが削除されます。よろしいですか？")) {
                localStorage.clear();
                alert("データを完全に削除しました。ページを再読み込みします。");
                window.location.reload();
            }
        }

        function openSettingPage(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            const content = document.getElementById('content-' + tabId);
            tab.url = 'sp//setting';
            tab.isStartPage = false;
            tab.isSettingPage = true;
            document.getElementById('title-' + tabId).innerText = '設定';
            if (activeTabId === tabId) {
                document.getElementById('main-address-bar').value = 'sp//setting';
            }
            content.innerHTML = createSettingPageHTML(tabId);
        }

        function switchTab(id) {
            activeTabId = id;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            const targetHandle = document.getElementById('handle-' + id);
            const targetContent = document.getElementById('content-' + id);
            if(targetHandle) targetHandle.classList.add('active');
            if(targetContent) targetContent.classList.add('active');
            
            const tab = tabs.find(t => t.id === id);
            if(tab) {
                document.getElementById('main-address-bar').value = tab.isStartPage ? '' : tab.url;
            }
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            const index = tabs.findIndex(t => t.id === id);
            tabs.splice(index, 1);
            document.getElementById('handle-' + id).remove();
            document.getElementById('content-' + id).remove();
            if (activeTabId === id) switchTab(tabs[tabs.length - 1].id);
        }

        function navigate(tabId, inputVal) {
            if(!inputVal.trim()) return;
            
            // 特殊コマンドの処理
            if(inputVal.trim() === 'sp//setting') {
                openSettingPage(tabId);
                return;
            }

            const tab = tabs.find(t => t.id === tabId);
            const content = document.getElementById('content-' + tabId);
            tab.url = inputVal; 
            tab.isStartPage = false;
            tab.isSettingPage = false;
            
            document.getElementById('global-loader').classList.add('active');
            document.getElementById('title-' + tabId).innerText = inputVal.split('/')[0];
            
            if (activeTabId === tabId) {
                document.getElementById('main-address-bar').value = inputVal;
            }

            // 履歴の保存設定がTrueの場合のみコンソール(または必要に応じたストレージ)にログを取る構成
            if(localStorage.getItem('saveHistory') !== 'false') {
                console.log("Navigated to: " + inputVal);
            }

            let targetProxyUrl = "";
            if (typeof __uv$config !== 'undefined') {
                targetProxyUrl = __uv$config.prefix + crypts.encode(search(inputVal));
            } else {
                targetProxyUrl = search(inputVal);
            }

            content.innerHTML = `<iframe src="${targetProxyUrl}" id="frame-${tabId}" onload="hideLoader()"></iframe>`;
        }

        function hideLoader() { 
            document.getElementById('global-loader').classList.remove('active'); 
        }

        document.getElementById('main-address-bar').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') navigate(activeTabId, e.target.value); 
        });

        function reloadFrame() { 
            const tab = tabs.find(t => t.id === activeTabId);
            if(tab && tab.isSettingPage) {
                openSettingPage(activeTabId);
                return;
            }
            const f = document.getElementById('frame-' + activeTabId); 
            if (f) f.src = f.src; 
        }
        function goBack() { const f = document.getElementById('frame-' + activeTabId); if (f) try { f.contentWindow.history.back(); } catch(e) {} }
        function goForward() { const f = document.getElementById('frame-' + activeTabId); if (f) try { f.contentWindow.history.forward(); } catch(e) {} }

        /* --- Chrome Bookmarks Logic --- */
        function getBookmarks() {
            return JSON.parse(localStorage.getItem('bookmarks')) || [
                { name: 'Google', url: 'google.com' }
            ];
        }

        function renderBookmarks() {
            const bar = document.getElementById('bookmark-bar');
            // Remove previous items except the plus button
            const items = bar.querySelectorAll('.bookmark-item');
            items.forEach(el => el.remove());

            const bms = getBookmarks();
            bms.forEach((bm, idx) => {
                const a = document.createElement('a');
                a.className = 'bookmark-item';
                a.href = '#';
                a.onclick = (e) => {
                    e.preventDefault();
                    navigate(activeTabId, bm.url);
                };
                a.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(confirm(`「${bm.name}」をお気に入りから削除しますか？`)) {
                        deleteBookmark(idx);
                    }
                };
                a.innerHTML = `<i class="fa-solid fa-star"></i><span>${bm.name}</span>`;
                bar.insertBefore(a, bar.querySelector('.add-bookmark-btn'));
            });
        }

        function openBookmarkModal() {
            document.getElementById('bookmark-modal').style.display = 'flex';
            document.getElementById('bm-name-input').focus();
        }

        function closeBookmarkModal() {
            document.getElementById('bookmark-modal').style.display = 'none';
            document.getElementById('bm-name-input').value = '';
            document.getElementById('bm-url-input').value = '';
        }

        function saveBookmark() {
            const name = document.getElementById('bm-name-input').value.trim();
            const url = document.getElementById('bm-url-input').value.trim();
            if(!name || !url) {
                alert("名前とURLを共に入力してください。");
                return;
            }
            const bms = getBookmarks();
            bms.push({ name, url });
            localStorage.setItem('bookmarks', JSON.stringify(bms));
            renderBookmarks();
            closeBookmarkModal();
        }

        function deleteBookmark(idx) {
            const bms = getBookmarks();
            bms.splice(idx, 1);
            localStorage.setItem('bookmarks', JSON.stringify(bms));
            renderBookmarks();
        }

        /* --- Panic Button (LoiLoNote等の外部偽装URLへの即時遷移) --- */
        function initPanicButton() {
            const btn = document.getElementById('panic-button');
            let isDragging = false;
            let dragStarted = false;
            let startX, startY, initialX, initialY;

            function startDrag(e) {
                isDragging = false;
                dragStarted = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;
                const rect = btn.getBoundingClientRect();
                initialX = rect.left;
                initialY = rect.top;
            }

            function doDrag(e) {
                if (!dragStarted) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = clientX - startX;
                const dy = clientY - startY;

                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                    isDragging = true;
                }

                if (isDragging) {
                    if (e.cancelable) e.preventDefault();
                    let newX = initialX + dx;
                    let newY = initialY + dy;
                    newX = Math.max(0, Math.min(window.innerWidth - btn.offsetWidth, newX));
                    newY = Math.max(0, Math.min(window.innerHeight - btn.offsetHeight, newY));
                    btn.style.left = newX + 'px';
                    btn.style.top = newY + 'px';
                    btn.style.bottom = 'auto';
                    btn.style.right = 'auto';
                }
            }

            function endDrag(e) {
                if (!dragStarted) return;
                dragStarted = false;
                if (!isDragging) {
                    window.location.href = 'https://loilonote.app/';
                }
            }

            btn.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', doDrag);
            document.addEventListener('mouseup', endDrag);
            btn.addEventListener('touchstart', startDrag, { passive: true });
            document.addEventListener('touchmove', doDrag, { passive: false });
            document.addEventListener('touchend', endDrag);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
          var proxySetting = 'uv';
          let swConfig = {
            'uv': { file: '/uv/sw.js', config: typeof __uv$config !== 'undefined' ? __uv$config : { prefix: '/uv/service/' } }
          };

          let { file: swFile, config: swConfigSettings } = swConfig[proxySetting];

          navigator.serviceWorker.register(swFile, { scope: swConfigSettings.prefix })
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
              
              document.addEventListener('DOMContentLoaded', () => {
                  const mainAddressBar = document.getElementById('main-address-bar');
                  mainAddressBar.parentNode.addEventListener('submit', (e) => { e.preventDefault(); });
              });
            })
            .catch((error) => {
              console.error('ServiceWorker registration failed:', error);
            });
        }
    </script>
</body>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

</html>
