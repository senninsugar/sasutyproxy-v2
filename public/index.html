<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="title" content="Light" />
    <meta name="description" content="A fast, simple, and highly customizable proxy." />
    <title>Bing</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-body: #f8f9fa;
            --chrome-header: #dee1e6;
            --chrome-tab-bg: #eceef0;
            --chrome-tab-active: #ffffff;
            --chrome-border: #dadce0;
            --elixir-primary: #4285f4;
            --text-main: #202124;
            --text-dim: #5f6368;
            --theme-color: #4285f4;
            --shadow-color: rgba(0,0,0,0.1);
            --shadow-color2: rgba(0,0,0,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
            width: 100%;
        }

        /* --- Boot Animation (Pulse) --- */
        #boot-loader {
            position: fixed; inset: 0; background: #ffffff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        .pulse-ring {
            width: 80px; height: 80px; border: 2px solid var(--theme-color);
            border-radius: 50%; position: absolute; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .boot-icon { z-index: 1; font-size: 2rem; color: var(--theme-color); }
        .boot-progress-container { width: 200px; height: 2px; background: #eee; margin-top: 60px; }
        .boot-progress-bar { width: 0%; height: 100%; background: var(--theme-color); transition: width 0.3s; }

        /* --- Browser Layout --- */
        .app-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .browser-header { 
            background: var(--chrome-header); 
            padding: 6px 6px 0 6px; 
            display: flex; 
            align-items: flex-end; 
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .tab-bar { display: flex; align-items: center; gap: 2px; flex: 1; overflow: hidden; }

        .tab {
            min-width: 150px; max-width: 200px; height: 32px; background: var(--chrome-tab-bg);
            border-radius: 8px 8px 0 0; display: flex; align-items: center; padding: 0 12px;
            cursor: grab; font-size: 0.8rem; color: var(--text-dim); transition: 0.2s;
            animation: tabFadeIn 0.2s ease-out;
        }
        @keyframes tabFadeIn {
            from { width: 0; min-width: 0; opacity: 0; transform: translateY(4px); }
            to { min-width: 150px; opacity: 1; transform: translateY(0); }
        }
        .tab.active { background: var(--chrome-tab-active); color: var(--text-main); font-weight: 500; }
        .tab-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
        .tab-close { opacity: 0; transition: 0.2s; cursor: pointer; }
        .tab:hover .tab-close, .tab.active .tab-close { opacity: 0.6; }

        .new-tab-btn { background: none; border: none; padding: 8px; cursor: pointer; color: var(--text-dim); }

        .nav-bar { 
            padding: 8px 16px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            background: var(--chrome-tab-active); 
            border-bottom: 1px solid var(--chrome-border); 
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .nav-controls { display: flex; gap: 4px; }
        .nav-btn { background: none; border: none; color: var(--text-dim); width: 30px; height: 30px; cursor: pointer; border-radius: 50%; }
        .nav-btn:hover { background: #f1f3f4; color: var(--text-main); }
        .address-bar-container { flex: 1; position: relative; }
        .address-bar { width: 100%; height: 34px; background: #f1f3f4; border: 1px solid transparent; border-radius: 20px; padding: 0 40px; color: var(--text-main); font-size: 0.9rem; -webkit-appearance: none; }
        .address-bar:focus { background: #fff; border: 1px solid #dadce0; box-shadow: 0 1px 3px var(--shadow-color); outline: none; }
        .bar-icon { position: absolute; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.85rem; }
        .bar-icon.search { left: 16px; }
        .bar-icon.reload { right: 16px; cursor: pointer; }

        .viewport-container { flex: 1; position: relative; background: #fff; overflow: hidden; }
        .tab-content { position: absolute; inset: 0; display: none; animation: fadeIn 0.3s; overflow: hidden; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Start Page */
        .start-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; overflow-y: auto; padding: 20px; }
        .start-logo { font-size: 2rem; font-weight: 500; color: #5f6368; margin-bottom: 30px; user-select: none; -webkit-user-select: none; }
        
        /* 1枚目の検索バー構造をそのまま移植可能なラッパー */
        .searchbar-wrapper {
            width: 100%; max-width: 500px; display: flex; align-items: center;
            padding: 6px 12px; border-radius: 24px; border: 1px solid #dfe1e5;
            box-shadow: 0 1px 6px var(--shadow-color); background: #fff;
        }
        .searchbar-left { display: flex; align-items: center; padding-right: 8px; }
        .search-icon { width: 20px; height: 20px; fill: var(--text-dim); display: flex; align-items: center; }
        .searchbar-center { flex: 1; display: flex; align-items: center; }
        .searchbar-input { width: 100%; border: none; outline: none; font-size: 1rem; color: var(--text-main); background: transparent; }

        .quick-links { margin-top: 40px; display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .q-link { text-decoration: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 0.75rem; user-select: none; -webkit-user-select: none; }
        .q-link i, .q-link img.icon-btn { width: 45px; height: 45px; border-radius: 50%; background: #f1f3f4; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: background 0.2s; object-fit: scale-down; padding: 10px; }
        .q-link:hover i, .q-link:hover img.icon-btn { background: #e8eaed; }
        
        /* Utility Controls Area */
        .utility-footer {
            position: absolute; bottom: 20px; left: 20px; display: flex; gap: 15px; align-items: center; z-index: 10;
        }
        .container { cursor: pointer; font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }

        /* Background Image Setup */
        #background { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; pointer-events: none; }
        #file-input { display: none; }

        .frame-loader { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--theme-color); display: none; z-index: 100; }
        .frame-loader.active { display: block; }

        /* --- Floating Panic Button --- */
        #panic-button {
            position: fixed; bottom: 20px; right: 20px; width: 26px; height: 26px;
            background-color: #000000; color: #ffffff; border: none; border-radius: 4px;
            box-shadow: 0 2px 8px var(--shadow-color2); display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; cursor: move; z-index: 10000; user-select: none; -webkit-user-select: none; touch-action: none;
        }
        #panic-button:active { background-color: #222222; }
    </style>
</head>

<body onload="startTime()">
    <div id="background"></div>

    <div id="boot-loader">
        <div class="pulse-ring"></div>
        <div class="boot-icon"><i class="fa-solid fa-globe"></i></div>
        <div class="boot-progress-container"><div class="boot-progress-bar" id="boot-bar"></div></div>
    </div>

    <div class="app-container">
        <header class="browser-header">
            <div class="tab-bar" id="tab-bar">
                <button class="new-tab-btn" onclick="addNewTab()"><i class="fa-solid fa-plus"></i></button>
            </div>
        </header>

        <nav class="nav-bar">
            <div class="nav-controls">
                <button class="nav-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i></button>
                <button class="nav-btn" onclick="goForward()"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="address-bar-container">
                <i class="fa-solid fa-magnifying-glass bar-icon search"></i>
                <input type="text" class="address-bar" id="main-address-bar" placeholder="検索またはURLを入力" autocomplete="off">
                <i class="fa-solid fa-rotate-right bar-icon reload" onclick="reloadFrame()"></i>
            </div>
        </nav>

        <div class="viewport-container" id="viewport-container">
            <div class="frame-loader" id="global-loader"></div>
        </div>
    </div>

    <button id="panic-button"><i class="fa-solid fa-exclamation"></i></button>

    <div class="utility-footer">
        <label class="container" title="Click for dark/light mode">
            <input checked="checked" type="checkbox" id="backgroundToggle" />
            <span>ダークモード</span>
        </label>
        <input type="file" id="file-input" accept="image/*" />
    </div>

    <div style="display:none;">
        <input type="color" id="colorPicker"><input type="color" id="colorPicker2"><input type="color" id="colorPicker3">
        <span id="time"></span><button id="upload-img"></button><button id="reset-img"></button>
        <input type="text" id="keyInput">
    </div>

    <script>
        const colorPicker = document.getElementById("colorPicker");
        if (colorPicker) {
            colorPicker.addEventListener("input", function () {
                document.documentElement.style.setProperty(
                    "--theme-color",
                    colorPicker.value
                );
                localStorage.setItem("themeColor", colorPicker.value);
            });
        }

        const savedColor = localStorage.getItem("themeColor");
        if (savedColor) {
            document.documentElement.style.setProperty(
                "--theme-color",
                savedColor
            );
            if (colorPicker) colorPicker.value = savedColor;
        }

        const colorPicker2 = document.getElementById("colorPicker2");
        if (colorPicker2) {
            colorPicker2.addEventListener("input", function () {
                document.documentElement.style.setProperty(
                    "--shadow-color",
                    colorPicker2.value
                );
                localStorage.setItem("shadowColor", colorPicker2.value);
            });
        }

        const savedColor2 = localStorage.getItem("shadowColor");
        if (savedColor2) {
            document.documentElement.style.setProperty(
                "--shadow-color",
                savedColor2
            );
            if (colorPicker2) colorPicker2.value = savedColor2;
        }

        const colorPicker3 = document.getElementById("colorPicker3");
        if (colorPicker3) {
            colorPicker3.addEventListener("input", function () {
                document.documentElement.style.setProperty(
                    "--shadow-color2",
                    colorPicker3.value
                );
                localStorage.setItem("shadowColor2", colorPicker3.value);
            });
        }

        const savedColor3 = localStorage.getItem("shadowColor2");
        if (savedColor3) {
            document.documentElement.style.setProperty(
                "--shadow-color2",
                savedColor3
            );
            if (colorPicker3) colorPicker3.value = savedColor3;
        }

        function toggleBackground() {
            var isChecked = document.getElementById("backgroundToggle").checked;
            document.body.style.backgroundColor = isChecked ? "black" : "white";
            document.body.style.color = isChecked ? "#fff" : "#4c4c4c";
            localStorage.setItem("backgroundToggle", isChecked);
        }

        function loadBackground() {
            var isChecked = localStorage.getItem("backgroundToggle") === "true";
            document.getElementById("backgroundToggle").checked = isChecked;
            toggleBackground();
        }

        document.addEventListener("DOMContentLoaded", function () {
            var checkbox = document.getElementById("backgroundToggle");
            checkbox.addEventListener("change", toggleBackground);
            loadBackground();
        });

        if (localStorage.getItem("backgroundImage")) {
            document.getElementById("background").style.backgroundImage =
                localStorage.getItem("backgroundImage");
        }

        document.getElementById("upload-img")?.addEventListener("click", function () {
                document.getElementById("file-input").click();
        });

        document.getElementById("file-input")?.addEventListener("change", function (event) {
                var file = event.target.files[0];
                var reader = new FileReader();
                reader.onload = function (e) {
                    var backgroundImage = "url(" + e.target.result + ")";
                    document.getElementById("background").style.backgroundImage = backgroundImage;
                    localStorage.setItem("backgroundImage", backgroundImage);
                };
                reader.readAsDataURL(file);
        });

        document.getElementById("reset-img")?.addEventListener("click", function () {
                document.getElementById("background").style.backgroundImage = "";
                localStorage.removeItem("backgroundImage");
        });

        function myClock() {
            setTimeout(function () {
                const d = new Date();
                const n = d.toLocaleTimeString();
                const timeEl = document.getElementById("time");
                if (timeEl) timeEl.innerHTML = n;
                myClock();
            }, 1000);
        }
        myClock();

        var elem = document.documentElement;

        function openFullscreen() {
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        }

        function closeFullscreen() {
            if (document.exitFullscreen) { document.exitFullscreen(); } 
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } 
            else if (document.msExitFullscreen) { document.msExitFullscreen(); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const currentUrl = "https://desmos.com";
            const defaultKey = "`";
            let triggerKey = defaultKey;

            function updateTriggerKey(value) {
                triggerKey = value.slice(0, 1);
            }

            document.getElementById("keyInput")?.addEventListener("input", (e) => {
                    updateTriggerKey(e.target.value);
            });

            document.getElementById("keyInput")?.addEventListener("keypress", (e) => {
                    if (e.key === "Enter") {
                        updateTriggerKey(e.target.value);
                        e.preventDefault();
                    }
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === triggerKey) {
                    window.location.href = currentUrl;
                }
            });
        });

        function openGame() {
            var win = window.open();
            var url = window.location.href;
            var iframe = win.document.createElement("iframe");
            iframe.style.frameborder = "0";
            iframe.style.marginwidth = "0";
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.style.position = "fixed";
            iframe.style.inset = "0px";
            iframe.style.outline = "none";
            iframe.style.scrolling = "auto";
            iframe.src = url;
            win.document.title = "Google";
            var link = win.document.createElement("link");
            link.rel = "icon";
            link.type = "image/x-icon";
            link.href = "https://www.google.com/favicon.ico";
            win.document.head.appendChild(link);
            win.document.body.appendChild(iframe);
        }
    </script>

    <script>
        "use strict";

        class crypts {
          static encode(str) {
            return encodeURIComponent(
              str
                .toString()
                .split("")
                .map((char, ind) => (ind % 2 ? String.fromCharCode(char.charCodeAt() ^ 2) : char))
                .join("")
            );
          }

          static decode(str) {
            if (str.charAt(str.length - 1) === "/") {
              str = str.slice(0, -1);
            }
            return decodeURIComponent(
              str
                .split("")
                .map((char, ind) => (ind % 2 ? String.fromCharCode(char.charCodeAt() ^ 2) : char))
                .join("")
            );
          }
        }

        function search(input) {
          input = input.trim();
          const searchTemplate = 'https://google.com/search?q=%s';

          try {
            return new URL(input).toString();
          } catch (err) {
            try {
              const url = new URL(`http://${input}`);
              if (url.hostname.includes(".")) {
                return url.toString();
              }
              throw new Error('Invalid hostname');
            } catch (err) {
              return searchTemplate.replace("%s", encodeURIComponent(input));
            }
          }
        }
    </script>

    <script>
        let tabs = [];
        let activeTabId = null;
        let tabCount = 0;

        new Sortable(document.getElementById('tab-bar'), { animation: 150, filter: '.new-tab-btn' });

        function startTime() {
            const bar = document.getElementById('boot-bar');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => document.getElementById('boot-loader').style.opacity = '0', 200);
                    setTimeout(() => document.getElementById('boot-loader').remove(), 700);
                }
                bar.style.width = progress + '%';
            }, 150);
            addNewTab();
            initPanicButton();
        }

        function addNewTab() {
            const id = 'tab-' + (++tabCount);
            tabs.push({ id: id, title: '新しいタブ', url: '', isStartPage: true });
            
            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.id = 'handle-' + id;
            tabEl.onclick = () => switchTab(id);
            tabEl.innerHTML = `<span class="tab-title" id="title-${id}">新しいタブ</span><i class="fa-solid fa-xmark tab-close" onclick="event.stopPropagation(); closeTab('${id}')"></i>`;
            
            document.getElementById('tab-bar').insertBefore(tabEl, document.querySelector('.new-tab-btn'));
            
            const contentEl = document.createElement('div');
            contentEl.className = 'tab-content';
            contentEl.id = 'content-' + id;
            contentEl.innerHTML = createStartPageHTML(id);
            
            document.getElementById('viewport-container').appendChild(contentEl);
            switchTab(id);
        }

        function createStartPageHTML(tabId) {
            return `
            <div class="start-page">
                <div class="start-logo">Japanese Proxy Web</div>
                <div class="searchbar-wrapper">
                    <div class="searchbar-left">
                        <span class="search-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                        </span>
                    </div>
                    <form class="searchbar-center" onsubmit="event.preventDefault(); navigate('${tabId}', this.querySelector('.searchbar-input').value);">
                        <input type="text" class="searchbar-input" maxlength="2048" autocapitalize="off" autocomplete="off" placeholder="Search Anything" />
                    </form>
                </div>
                <div class="quick-links">
                    <a href="#" class="q-link" onclick="alert('ようこそJapanese Proxy Web略してJPWへ！履歴無しで見るには右上の目を押してね。'); return false;">
                        <img src="/assets/imgs/help.png" alt="Help" class="icon-btn" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><i class="fa-solid fa-question" style="display:none;"></i>
                        <span>ヘルプ</span>
                    </a>
                    <a href="#" class="q-link" onclick="openGame(); return false;">
                        <img src="/assets/imgs/hide.png" alt="Cloak" class="icon-btn" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><i class="fa-solid fa-eye-slash" style="display:none;"></i>
                        <span>Cloak (シークレット)</span>
                    </a>
                </div>
            </div>`;
        }

        function switchTab(id) {
            activeTabId = id;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            const targetHandle = document.getElementById('handle-' + id);
            const targetContent = document.getElementById('content-' + id);
            if(targetHandle) targetHandle.classList.add('active');
            if(targetContent) targetContent.classList.add('active');
            
            const tab = tabs.find(t => t.id === id);
            if(tab) {
                document.getElementById('main-address-bar').value = tab.isStartPage ? '' : tab.url;
            }
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            const index = tabs.findIndex(t => t.id === id);
            tabs.splice(index, 1);
            document.getElementById('handle-' + id).remove();
            document.getElementById('content-' + id).remove();
            if (activeTabId === id) switchTab(tabs[tabs.length - 1].id);
        }

        function navigate(tabId, inputVal) {
            if(!inputVal.trim()) return;
            const tab = tabs.find(t => t.id === tabId);
            const content = document.getElementById('content-' + tabId);
            tab.url = inputVal; 
            tab.isStartPage = false;
            
            document.getElementById('global-loader').classList.add('active');
            document.getElementById('title-' + tabId).innerText = inputVal.split('/')[0];
            
            if (activeTabId === tabId) {
                document.getElementById('main-address-bar').value = inputVal;
            }

            // 1枚目に組み込まれていたServiceWorker駆動用のURLエンコードロジックを適用
            let targetProxyUrl = "";
            if (typeof __uv$config !== 'undefined') {
                targetProxyUrl = __uv$config.prefix + crypts.encode(search(inputVal));
            } else {
                targetProxyUrl = search(inputVal);
            }

            content.innerHTML = `<iframe src="${targetProxyUrl}" id="frame-${tabId}" onload="hideLoader()"></iframe>`;
        }

        function hideLoader() { 
            document.getElementById('global-loader').classList.remove('active'); 
        }

        document.getElementById('main-address-bar').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') navigate(activeTabId, e.target.value); 
        });

        function reloadFrame() { const f = document.getElementById('frame-' + activeTabId); if (f) f.src = f.src; }
        function goBack() { const f = document.getElementById('frame-' + activeTabId); if (f) try { f.contentWindow.history.back(); } catch(e) {} }
        function goForward() { const f = document.getElementById('frame-' + activeTabId); if (f) try { f.contentWindow.history.forward(); } catch(e) {} }

        /* --- Panic Button (LoiLoNote等の外部偽装URLへの即時遷移) --- */
        function initPanicButton() {
            const btn = document.getElementById('panic-button');
            let isDragging = false;
            let dragStarted = false;
            let startX, startY, initialX, initialY;

            function startDrag(e) {
                isDragging = false;
                dragStarted = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;
                const rect = btn.getBoundingClientRect();
                initialX = rect.left;
                initialY = rect.top;
            }

            function doDrag(e) {
                if (!dragStarted) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = clientX - startX;
                const dy = clientY - startY;

                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                    isDragging = true;
                }

                if (isDragging) {
                    if (e.cancelable) e.preventDefault();
                    let newX = initialX + dx;
                    let newY = initialY + dy;
                    newX = Math.max(0, Math.min(window.innerWidth - btn.offsetWidth, newX));
                    newY = Math.max(0, Math.min(window.innerHeight - btn.offsetHeight, newY));
                    btn.style.left = newX + 'px';
                    btn.style.top = newY + 'px';
                    btn.style.bottom = 'auto';
                    btn.style.right = 'auto';
                }
            }

            function endDrag(e) {
                if (!dragStarted) return;
                dragStarted = false;
                if (!isDragging) {
                    window.location.href = 'https://loilonote.app/';
                }
            }

            btn.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', doDrag);
            document.addEventListener('mouseup', endDrag);
            btn.addEventListener('touchstart', startDrag, { passive: true });
            document.addEventListener('touchmove', doDrag, { passive: false });
            document.addEventListener('touchend', endDrag);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
          var proxySetting = 'uv';
          let swConfig = {
            'uv': { file: '/uv/sw.js', config: typeof __uv$config !== 'undefined' ? __uv$config : { prefix: '/uv/service/' } }
          };

          let { file: swFile, config: swConfigSettings } = swConfig[proxySetting];

          navigator.serviceWorker.register(swFile, { scope: swConfigSettings.prefix })
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
              
              // 統合トップバーの検索フォーム用イベント登録
              document.addEventListener('DOMContentLoaded', () => {
                  const mainAddressBar = document.getElementById('main-address-bar');
                  mainAddressBar.parentNode.addEventListener('submit', (e) => { e.preventDefault(); });
              });
            })
            .catch((error) => {
              console.error('ServiceWorker registration failed:', error);
            });
        }
    </script>
</body>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

</html>
